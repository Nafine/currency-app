services:
  currency-app:
    image: naf1ne/currency-app:v0.0.1
    container_name: currency-app
    user: "1001:1001"

    ports:
    -  '8080:8080'
    restart: unless-stopped

    environment:
      PORT: '8080'
      VERSION: 'v0.0.1'
      AUTHOR: 'nafine'

    read_only: true
    tmpfs:
      - /tmp

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - "ALL"
    mem_limit: 128m
    cpus: "0.2"
